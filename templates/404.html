{% extends "base.html" %}
{% block title %}404 — {{ app_name }}{% endblock %}
{% block page_title %}Error 404{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <h2 class="error-title">Página no encontrada</h2>
  <p class="error-desc">La página que buscas no existe o fue movida.</p>
  <a href="{{ url_for('index') }}" class="btn-primary">Volver al Inicio</a>
</div>
{% endblock %}
