{% extends "base.html" %}
{% block title %}500 — {{ app_name }}{% endblock %}
{% block page_title %}Error 500{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h2 class="error-title">Error interno del servidor</h2>
  <p class="error-desc">Ocurrió un error inesperado. Por favor intenta de nuevo.</p>
  <a href="{{ url_for('index') }}" class="btn-primary">Volver al Inicio</a>
</div>
{% endblock %}
