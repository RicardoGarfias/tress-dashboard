<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">T</div>
      <div class="logo-text">
        <span class="logo-name">TRESS</span>
        <span class="logo-sub">International</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('index') }}" class="nav-item {% if active == 'inicio' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Inicio</span>
      </a>
      <a href="{{ url_for('nomina') }}" class="nav-item {% if active == 'nomina' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Nómina & RRHH</span>
      </a>
      <a href="{{ url_for('operaciones') }}" class="nav-item {% if active == 'operaciones' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>Operaciones</span>
      </a>
      <a href="{{ url_for('reportes') }}" class="nav-item {% if active == 'reportes' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
        <span>Reportes</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar">AD</div>
      <div class="user-info">
        <span class="user-name">Admin Tress</span>
        <span class="user-role">v{{ version }} &copy; {{ current_year }}</span>
      </div>
    </div>
  </aside>

  <!-- Main wrapper -->
  <div class="main-wrap">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="sidebarToggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
      </div>
      <div class="topbar-right">
        <span class="current-date" id="currentDate"></span>
        <div class="api-status" id="apiStatus">
          <div class="status-dot"></div>
          <span class="status-label">API</span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
